[general]
# Force the backend to standard "DirectSound" or "WASAPI" if needed, but usually default is fine.
# We want to ensure it treats output as stereo headphones to enable HRTF.
channels = stereo
frequency = 44100

[decoder]
# High quality mode
hq-mode = true

[hrtf]
# Force HRTF on if possible.
# Some versions of OpenAL Soft use "hrtf = true" in [general] or [hrtf]
mode = basic
